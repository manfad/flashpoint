name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: fp-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: fp-darwin-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: fp-linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: fp-win32-x64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        shell: bash
        run: |
          rustup toolchain install 1.89.0 --profile minimal
          rustup target add ${{ matrix.target }} --toolchain 1.89.0

      - name: Build
        shell: bash
        run: cargo +1.89.0 build --release --locked --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/fp${{ runner.os == 'Windows' && '.exe' || '' }}" "dist/${{ matrix.asset }}"
          chmod +x "dist/${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  publish:
    name: publish github release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
